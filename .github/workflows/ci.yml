name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Swift tests
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Swift toolchain
        run: swift --version

      - name: Run tests
        run: swift test

      - name: Build release executable
        run: swift build -c release
